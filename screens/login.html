<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Elan Zaak — Iniciar Sesion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--c-black:#000;--c-white:#fff;--c-accent:#2ea3f2;--c-danger:#ff6261;--c-navy:#00639a;--c-gray-mid:#ccc;--c-gray-text:#555;--c-bg:#f9f9f9;--fh:'Archivo',sans-serif;--fb:'Open Sans',sans-serif;--sh:0 2px 8px rgba(0,0,0,.08)}
html,body{height:100%}
body{font-family:var(--fb);background:#e8e8e8;display:flex;flex-direction:column;-webkit-text-size-adjust:100%;text-size-adjust:100%}

/* HEADER */
.login-header{background:var(--c-black);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between}
.login-header .logo{font-family:var(--fh);font-size:1.25rem;font-weight:700;color:var(--c-white);letter-spacing:.04em}
.login-header .logo-accent{color:var(--c-accent)}
.login-header .version{font-family:var(--fb);font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase}

/* MAIN */
.login-main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}

/* CARD */
.login-card{background:var(--c-white);box-shadow:var(--sh);width:100%;max-width:440px;padding:48px 40px}
.login-card h1{font-family:var(--fh);font-size:1.6rem;font-weight:700;color:var(--c-black);margin-bottom:6px;letter-spacing:.02em}
.login-card .subtitle{font-size:14px;color:var(--c-gray-text);margin-bottom:36px}

/* FORM */
.login-form{display:flex;flex-direction:column;gap:20px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;font-weight:600;color:var(--c-black)}
.form-group input{font-family:var(--fb);font-size:15px;padding:12px 16px;border:1px solid var(--c-gray-mid);border-radius:0;outline:none;background:var(--c-white);transition:border-color .2s}
.form-group input:focus{border-color:var(--c-accent)}
.form-group input.error{border-color:var(--c-danger)}
.form-group .form-error{font-size:12px;color:var(--c-danger);display:none}
.form-group.has-error .form-error{display:block}

/* CHECKBOX ROW */
.form-options{display:flex;align-items:center;justify-content:space-between;gap:12px}
.form-options .chk{display:flex;align-items:center;gap:8px}
.form-options input[type=checkbox]{width:16px;height:16px;accent-color:var(--c-accent);cursor:pointer}
.form-options label{font-size:13px;color:var(--c-gray-text);cursor:pointer}
.form-options a{font-size:13px;color:var(--c-accent);text-decoration:none;font-weight:600}
.form-options a:hover{text-decoration:underline}

/* BUTTON */
.btn-login{font-family:var(--fh);font-size:15px;font-weight:600;padding:14px 28px;border-radius:0;cursor:pointer;letter-spacing:.04em;transition:background .2s;border:2px solid transparent;background:var(--c-accent);color:var(--c-white);width:100%;margin-top:4px}
.btn-login:hover{background:#1a8fd4}
.btn-login:active{background:#1580c0}

/* ERROR BANNER */
.error-banner{background:#ffebee;border:1px solid var(--c-danger);color:#c62828;font-size:14px;padding:14px 18px;border-radius:0;display:none;align-items:center;gap:10px;margin-bottom:4px}
.error-banner.visible{display:flex}
.error-banner .error-icon{font-size:18px}

/* FOOTER */
.login-footer{text-align:center;padding:24px 20px;font-size:12px;color:var(--c-gray-text)}
.login-footer a{color:var(--c-accent);text-decoration:none}

/* RESPONSIVE */
@media(max-width:767px){
  .login-header{padding:0 20px}
  .login-header .version{display:none}
  .login-card{padding:36px 24px}
  .login-card h1{font-size:1.4rem}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="login-header">
  <div class="logo">Elan <span class="logo-accent">Zaak</span></div>
  <span class="version">CRM v2.0</span>
</header>

<!-- MAIN -->
<main class="login-main">
  <div class="login-card">
    <h1>Iniciar sesion</h1>
    <p class="subtitle">Accede a tu cuenta del CRM</p>

    <!-- Error banner -->
    <div class="error-banner" id="errorBanner">
      <span class="error-icon">&#10006;</span>
      <span id="errorMessage">Credenciales invalidas. Verifica tu correo y contrasena.</span>
    </div>

    <form class="login-form" id="loginForm" novalidate>

      <div class="form-group" id="emailGroup">
        <label for="email">Correo electronico</label>
        <input type="email" id="email" name="email" placeholder="usuario@elanzaak.com" autocomplete="email" required>
        <span class="form-error">Ingresa un correo valido</span>
      </div>

      <div class="form-group" id="passwordGroup">
        <label for="password">Contrasena</label>
        <input type="password" id="password" name="password" placeholder="Tu contrasena" autocomplete="current-password" required>
        <span class="form-error">La contrasena es obligatoria</span>
      </div>

      <div class="form-options">
        <div class="chk">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Recordarme</label>
        </div>
        <a href="#">Olvide mi contrasena</a>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">Iniciar sesion</button>

    </form>
  </div>
</main>

<!-- FOOTER -->
<footer class="login-footer">
  &copy; 2026 Elan Zaak &mdash; Precios de Transferencia &middot; <a href="#">Soporte</a>
</footer>

<script>
const form = document.getElementById('loginForm');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const emailGroup = document.getElementById('emailGroup');
const passwordGroup = document.getElementById('passwordGroup');
const errorBanner = document.getElementById('errorBanner');
const errorMessage = document.getElementById('errorMessage');
const btnLogin = document.getElementById('btnLogin');

function clearErrors() {
  emailGroup.classList.remove('has-error');
  passwordGroup.classList.remove('has-error');
  emailInput.classList.remove('error');
  passwordInput.classList.remove('error');
  errorBanner.classList.remove('visible');
}

function showFieldError(group, input, msg) {
  group.classList.add('has-error');
  input.classList.add('error');
  if (msg) {
    errorMessage.textContent = msg;
    errorBanner.classList.add('visible');
  }
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

emailInput.addEventListener('input', () => {
  emailGroup.classList.remove('has-error');
  emailInput.classList.remove('error');
});
passwordInput.addEventListener('input', () => {
  passwordGroup.classList.remove('has-error');
  passwordInput.classList.remove('error');
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErrors();

  const email = emailInput.value.trim();
  const password = passwordInput.value;
  let hasError = false;

  if (!email || !isValidEmail(email)) {
    showFieldError(emailGroup, emailInput);
    hasError = true;
  }
  if (!password) {
    showFieldError(passwordGroup, passwordInput);
    hasError = true;
  }
  if (hasError) return;

  // Login — redirect to dashboard
  btnLogin.textContent = 'Ingresando...';
  btnLogin.disabled = true;

  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 800);
});
</script>

</body>
</html>
